name: Update Visitor Counter

on:
  repository_dispatch:
    types: [visitor-click]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Update counter
        run: |
          COUNT=$(cat api/counter.json | grep -o '"count": [0-9]*' | grep -o '[0-9]*')
          COUNT=$((COUNT + 1))
          echo "{\"count\": $COUNT}" > api/counter.json
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add api/counter.json
          git commit -m "Update visitor counter to $(cat api/counter.json | grep -o '"count": [0-9]*')"
          git push
